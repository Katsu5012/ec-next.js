name: Claude Code Review

permissions:
  contents: read
  pull-requests: write
  id-token: write

on:
  pull_request:
    types: [opened]

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            このPRの変更をレビューしてください。以下の観点でフィードバックをお願いします：
            - コード品質とベストプラクティス
            - バグの可能性
            - セキュリティ上の問題
            - パフォーマンスの考慮点

            コメントは `gh pr comment` でトップレベルに、インラインコメントは `mcp__github_inline_comment__create_inline_comment` を使用してください。
          claude_args: '--allowedTools "Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"'
